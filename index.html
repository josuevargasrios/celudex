<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200">
    <title>CaseDex - by Josvar 💚</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📱</text></svg>">
</head>
<body>
    <div class="casedex-container">
        <header class="pokedex-header">
            <div class="header-top">
                <div class="pokedex-camera"></div>
                <div class="pokedex-lights">
                    <span class="light green-neon"></span>
                    <span class="light dark-green"></span>
                    <span class="light white"></span>
                </div>
            </div>
            <h1>💚 CaseDex</h1>
            <p>El buscador oficial de la tienda. Selecciona un modelo para ver especificaciones completas.</p>
        </header>

        <section class="panel-control">
            <div class="search-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" id="buscador-input" placeholder="Buscar referencia (ej: iPhone 15 Pro, 17e)...">
            </div>
            
            <div class="filter-wrapper">
                <label for="filtro-grupo">Filtrar por Grupo:</label>
                <select id="filtro-grupo">
                    <option value="todos">⚡ Todos los Modelos</option>
                    <option value="Apple">🍏 Apple</option>
                    <option value="Samsung">🔹 Samsung</option>
                    <option value="Xiaomi">🔺 Xiaomi</option>
                </select>
            </div>
        </section>

        <main class="grid-matriz" id="grid-dispositivos"></main>
        
        <div id="no-resultados" class="mensaje-vacio oculto">
            ❌ No se encontró ningún dispositivo que coincida.
        </div>
    </div>

    <script>
        // ESTA ES TU ALTERNATIVA A BASE DE DATOS (Objeto Centralizado)
        const listaIphones = [
            { modelo: "iPhone X", grupo: "Apple" },
            { modelo: "iPhone XR", grupo: "Apple" },
            { modelo: "iPhone XS", grupo: "Apple" },
            { modelo: "iPhone XS Max", grupo: "Apple" },
            { modelo: "iPhone 11", grupo: "Apple" },
            { modelo: "iPhone 11 Pro", grupo: "Apple" },
            { modelo: "iPhone 11 Pro Max", grupo: "Apple" },
            { modelo: "iPhone 12 Mini", grupo: "Apple" },
            { modelo: "iPhone 12", grupo: "Apple" },
            { modelo: "iPhone 12 Pro", grupo: "Apple" },
            { modelo: "iPhone 12 Pro Max", grupo: "Apple" },
            { modelo: "iPhone 13 Mini", grupo: "Apple" },
            { modelo: "iPhone 13", grupo: "Apple" },
            { modelo: "iPhone 13 Pro", grupo: "Apple" },
            { modelo: "iPhone 13 Pro Max", grupo: "Apple" },
            { modelo: "iPhone 14", grupo: "Apple" },
            { modelo: "iPhone 14 Plus", grupo: "Apple" },
            { modelo: "iPhone 14 Pro", grupo: "Apple" },
            { modelo: "iPhone 14 Pro Max", grupo: "Apple" },
            { modelo: "iPhone 15", grupo: "Apple" },
            { modelo: "iPhone 15 Plus", grupo: "Apple" },
            { modelo: "iPhone 15 Pro", grupo: "Apple" },
            { modelo: "iPhone 15 Pro Max", grupo: "Apple" },
            { modelo: "iPhone 16e", grupo: "Apple" },
            { modelo: "iPhone 16", grupo: "Apple" },
            { modelo: "iPhone 16 Plus", grupo: "Apple" },
            { modelo: "iPhone 16 Pro", grupo: "Apple" },
            { modelo: "iPhone 16 Pro Max", grupo: "Apple" },
            { modelo: "iPhone 17e", grupo: "Apple" },
            { modelo: "iPhone 17", grupo: "Apple" },
            { modelo: "iPhone Air", grupo: "Apple" },
            { modelo: "iPhone 17 Pro", grupo: "Apple" },
            { modelo: "iPhone 17 Pro Max", grupo: "Apple" }
        ];

        const grid = document.getElementById('grid-dispositivos');
        const buscador = document.getElementById('buscador-input');
        const filtroGrupo = document.getElementById('filtro-grupo');
        const noResultados = document.getElementById('no-resultados');

        function renderizarMatriz() {
            const textoBusqueda = buscador.value.toLowerCase().trim();
            const grupoSeleccionado = filtroGrupo.value;
            
            grid.innerHTML = '';
            let contadorVisibles = 0;

            listaIphones.forEach((item, index) => {
                const coincideBusqueda = item.modelo.toLowerCase().includes(textoBusqueda);
                const coincideGrupo = (grupoSeleccionado === 'todos') || (item.grupo === grupoSeleccionado);

                if (coincideBusqueda && coincideGrupo) {
                    contadorVisibles++;
                    const numeroDex = String(index + 1).padStart(3, '0');

                    // 1. CONDICIÓN AJUSTADA:
                    // Primero, si es un modelo 'e' (16e o 17e), obligamos a que NO sea Isla Dinámica (false)
                    let esIslaDinamica = false;

                    if (item.modelo.includes('16e') || item.modelo.includes('17e')) {
                        esIslaDinamica = false; 
                    } 
                    // Si no es un modelo 'e', aplicamos la regla para el Air y las series 14 Pro, 15, 16 y 17 normales
                    else if (
                        item.modelo.includes('Air') ||
                        item.modelo.includes('14 Pro') || 
                        item.modelo.includes('15') || 
                        item.modelo.includes('16') || 
                        item.modelo.includes('17')
                    ) {
                        esIslaDinamica = true;
                    }

                    // 2. Definimos si dibujamos la muesca ovalada o el notch clásico
                    const elementoPantalla = esIslaDinamica 
                        ? '<div class="isla-dinamica"></div>' 
                        : '<div class="notch"></div>';
                    
                    const tarjeta = document.createElement('div');
                    tarjeta.className = 'tarjeta-pokemon';
                    tarjeta.innerHTML = `
                        <div class="pokemon-id">#${numeroDex}</div>
                        <div class="imagen-contenedor">
                            <div class="smartphone-icon">
                                ${elementoPantalla}
                            </div>
                        </div>
                        <div class="marca">Apple</div>
                        <div class="modelo">${item.modelo}</div>
                    `;
                    
                    // 🌟 AQUÍ ESTÁ EL CAMBIO: Redirección pasándole el nombre por URL
                    tarjeta.addEventListener('click', () => {
                        window.location.href = `detalles.html?modelo=${encodeURIComponent(item.modelo)}`;
                    });
                    grid.appendChild(tarjeta);
                }
            });

            if (contadorVisibles === 0) noResultados.classList.remove('oculto');
            else noResultados.classList.add('oculto');
        }

        buscador.addEventListener('input', renderizarMatriz);
        filtroGrupo.addEventListener('change', renderizarMatriz);
        document.addEventListener('DOMContentLoaded', renderizarMatriz);
    </script>
</body>
</html>
